server4:
# You can configure the specific interfaces that you want OpenCHAMI to
# listen on by uncommenting the lines below and setting the interface
#
# The 'listen' setting is only known on the management node at
# deployment time, so it is filled in by 'OpenCHAMI-Install.sh' not
# templated like the rest of the content here.
  listen:
    - "%::MGMT_NET_HEAD_IFNAME::"
  plugins:
# You are able to set the IP address of the system in server_id as the
# place to look for a DHCP server DNS is able to be set to whatever you
# want but it is much easier if you keep it set so the server IP Router
# is also able to be set to whatever your network router address is
    - searchdomains: {{ hosting_config.net_head_domain }}
    - server_id: {{ hosting_config.net_head_ip }}
    - dns: {{ hosting_config.net_head_ip }}
    - router: {{ hosting_config.net_head_ip }}
    - netmask: {{ hosting_config.cluster_net_mask }}
    - coresmd: https://{{ hosting_config.net_head_hostname }}.{{ hosting_config.net_head_domain }}:8443 http://{{ hosting_config.net_head_ip }}:8081 /root_ca/root_ca.crt 30s 1h false
# DHCP settings...
    - bootloop: /tmp/coredhcp.db default 5m {{ hosting_config.cluster_net_dhcp_start }} {{ hosting_config.cluster_net_dhcp_end }}
